meta:
  version: 2
compositionCategories:
  - id: blend-erva-pura
    label: Blend de Erva-Mate Pura
    description: Apenas Ilex paraguariensis, combinando safras, origens ou processos diferentes.
    howToRead: Buscar equilíbrio, consistência e integração entre lotes, sem exigir picos extremos em um único eixo.
    risk: Confundir arredondamento e harmonia com falta de personalidade.
  - id: mate-composto
    label: Mate Composto
    description: Erva-mate base misturada com botânicos, especiarias, flores ou aromatizantes.
    howToRead: Avaliar a sinergia entre o botânico adjunto e a erva-base, registrando aroma líder, estrutura de fundo e retrogosto da erva nua.
    risk: Deixar o aromatizante esconder defeitos da erva-base ou penalizar a amostra por fugir da tipicidade de erva pura.
evaluationAxes:
  - id: intensidade
    label: Intensidade
    kind: structure
    description: Impacto global dos estímulos percebidos, sem confundir força com qualidade.
    anchors: ["baixa", "média", "alta"]
  - id: amargor
    label: Amargor
    kind: structure
    description: Eixo estrutural da erva-mate, podendo ser verde, afiado, redondo ou profundo.
    anchors: ["baixo", "médio", "alto"]
  - id: adstringencia
    label: Adstringência
    kind: structure
    description: Secância tátil e gengival, curta ou prolongada, positiva quando sustenta a bebida sem raspar.
    anchors: ["fina", "marcante", "agressiva"]
  - id: corpo
    label: Corpo
    kind: structure
    description: Densidade, peso e preenchimento tátil da bebida ao longo da sessão.
    anchors: ["leve", "médio", "cheio"]
  - id: textura
    label: Textura
    kind: structure
    description: Qualidade tátil da bebida, indo de sedosa e cremosa a arenosa ou áspera.
    anchors: ["sedosa", "cremosa", "arenosa"]
  - id: suculencia
    label: Suculência
    kind: structure
    description: Capacidade da bebida de salivar e manter sensação caldosa ou aquosa em boca.
    anchors: ["aquosa", "salivante", "caldosa"]
  - id: persistencia
    label: Persistência
    kind: structure
    description: Tempo de permanência das sensações e do retrogosto após o gole.
    anchors: ["curta", "média", "longa"]
  - id: final
    label: Final
    kind: structure
    description: Direção e qualidade do encerramento sensorial no retrogosto.
    anchors: ["limpo", "seco", "doce"]
  - id: trigeminalidade
    label: Trigeminalidade
    kind: trigeminal
    description: Frescor, formigamento, aquecimento ou leve anestesia percebidos fisicamente, separados do aroma.
    anchors: ["contida", "presente", "dominante"]
  - id: tipicidade
    label: Tipicidade
    kind: judgment
    description: Aderência ao estilo-base ou coerência com a proposta sensorial declarada.
    anchors: ["difusa", "correta", "exemplar"]
  - id: limpeza
    label: Limpeza
    kind: judgment
    description: Ausência de contaminações, desvios e ruídos que comprometam a leitura.
    anchors: ["comprometida", "correta", "limpa"]
styles:
  - id: chimarrao
    label: Chimarrão tradicional brasileiro
    shortLabel: Chimarrão
    description: Erva muito fresca, moagem fina, alto teor de pó, baixo ou nenhum estacionamento.
  - id: terere
    label: Tereré
    shortLabel: Tereré
    description: Corte mais grosso, maior proporção de palitos, extração fria.
  - id: argentino
    label: Mate argentino con palo
    shortLabel: Argentino
    description: Folha mais grossa, presença relevante de palitos, estacionamento prolongado.
  - id: uruguaio
    label: Mate uruguaio despalado ou PU-1
    shortLabel: Uruguaio
    description: Corte fino, quase sem palitos, pó relevante, normalmente estacionado.
  - id: tostado
    label: Mate tostado
    shortLabel: Tostado
    description: Tratamento térmico mais intenso, perfil de Maillard.
