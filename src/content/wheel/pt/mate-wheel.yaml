meta:
  version: 1
styles:
  - id: chimarrao
    label: Chimarrão tradicional brasileiro
    shortLabel: Chimarrão
    description: Erva muito fresca, moagem fina, alto teor de pó, baixo ou nenhum estacionamento.
  - id: terere
    label: Tereré
    shortLabel: Tereré
    description: Corte mais grosso, maior proporção de palitos, extração fria.
  - id: argentino
    label: Mate argentino con palo
    shortLabel: Argentino
    description: Folha mais grossa, presença relevante de palitos, estacionamento prolongado.
  - id: uruguaio
    label: Mate uruguaio despalado ou PU-1
    shortLabel: Uruguaio
    description: Corte fino, quase sem palitos, pó relevante, normalmente estacionado.
  - id: tostado
    label: Mate tostado
    shortLabel: Tostado
    description: Tratamento térmico mais intenso, perfil de Maillard.
