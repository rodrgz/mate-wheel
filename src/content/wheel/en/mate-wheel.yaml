meta:
  version: 2
compositionCategories:
  - id: blend-erva-pura
    label: Pure Yerba Mate Blend
    description: Only Ilex paraguariensis, combining different harvests, origins, or processes.
    howToRead: Look for balance, consistency, and integration between lots without demanding extreme peaks on a single axis.
    risk: Mistaking roundness and harmony for lack of personality.
  - id: mate-composto
    label: Compound Mate
    description: Base yerba mate blended with botanicals, spices, flowers, or flavorings.
    howToRead: >-
      Evaluate the synergy between the added botanical and the base yerba, noting the leading aroma, the background
      structure, and the aftertaste of the naked yerba.
    risk: >-
      Letting the flavoring hide defects in the base yerba or penalizing the sample for drifting away from pure-yerba
      typicity.
evaluationAxes:
  - id: intensidade
    label: Intensity
    kind: structure
    description: Overall impact of the perceived stimuli, without confusing force with quality.
    anchors:
      - low
      - medium
      - high
  - id: amargor
    label: Bitterness
    kind: structure
    description: A structural axis of yerba mate that can read as green, sharp, rounded, or deep.
    anchors:
      - low
      - medium
      - high
  - id: adstringencia
    label: Astringency
    kind: structure
    description: Drying tactile and gingival grip, short or prolonged, positive when it supports the beverage without scraping.
    anchors:
      - fine
      - marked
      - aggressive
  - id: corpo
    label: Body
    kind: structure
    description: Density, weight, and tactile fill of the beverage throughout the session.
    anchors:
      - light
      - medium
      - full
  - id: textura
    label: Texture
    kind: structure
    description: Tactile quality of the beverage, ranging from silky and creamy to sandy or rough.
    anchors:
      - silky
      - creamy
      - sandy
  - id: suculencia
    label: Juiciness
    kind: structure
    description: The beverage's capacity to stimulate salivation and maintain a brothy or watery mouthfeel.
    anchors:
      - watery
      - salivating
      - brothy
  - id: persistencia
    label: Persistence
    kind: structure
    description: How long sensations and aftertaste remain after the sip.
    anchors:
      - short
      - medium
      - long
  - id: final
    label: Finish
    kind: structure
    description: Direction and quality of the sensory close in the aftertaste.
    anchors:
      - clean
      - dry
      - sweet
  - id: trigeminalidade
    label: Trigeminality
    kind: trigeminal
    description: Cooling, tingling, warming, or slight anesthesia perceived physically and kept separate from aroma.
    anchors:
      - restrained
      - present
      - dominant
  - id: tipicidade
    label: Typicity
    kind: judgment
    description: Adherence to the base style or coherence with the declared sensory proposal.
    anchors:
      - diffuse
      - correct
      - exemplary
  - id: limpeza
    label: Cleanliness
    kind: judgment
    description: Absence of contamination, deviations, and noise that compromise the reading.
    anchors:
      - compromised
      - correct
      - clean
styles:
  - id: chimarrao
    label: Traditional Brazilian Chimarrão
    shortLabel: Chimarrão
    description: Very fresh yerba, fine grind, high powder content, little to no aging.
  - id: terere
    label: Tereré
    shortLabel: Tereré
    description: Coarser cut, higher proportion of stems, cold extraction.
  - id: argentino
    label: Argentine mate con palo
    shortLabel: Argentine
    description: Coarser leaf, noticeable stem presence, extended aging.
  - id: uruguaio
    label: Uruguayan despalado or PU-1 (fine-cut) mate
    shortLabel: Uruguayan
    description: Fine cut, almost no stems, notable powder content, usually aged.
  - id: tostado
    label: Toasted mate
    shortLabel: Toasted
    description: More intense heat treatment, Maillard-driven profile.
