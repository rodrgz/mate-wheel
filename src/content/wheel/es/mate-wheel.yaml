meta:
  version: 2
compositionCategories:
  - id: blend-erva-pura
    label: Blend de Yerba Mate Pura
    description: Solo Ilex paraguariensis, combinando cosechas, orígenes o procesos distintos.
    howToRead: Busca equilibrio, consistencia e integración entre lotes, sin exigir picos extremos en un único eje.
    risk: Confundir redondez y armonía con falta de personalidad.
  - id: mate-composto
    label: Mate Compuesto
    description: Yerba mate base mezclada con botánicos, especias, flores o aromatizantes.
    howToRead: >-
      Evalúa la sinergia entre el botánico adjunto y la yerba base, registrando el aroma líder, la estructura de fondo y
      el retrogusto de la yerba desnuda.
    risk: >-
      Dejar que el aromatizante esconda defectos de la yerba base o penalizar la muestra por alejarse de la tipicidad de
      yerba pura.
evaluationAxes:
  - id: intensidade
    label: Intensidad
    kind: structure
    description: Impacto global de los estímulos percibidos, sin confundir fuerza con calidad.
    anchors:
      - baja
      - media
      - alta
  - id: amargor
    label: Amargor
    kind: structure
    description: Eje estructural de la yerba mate, que puede leerse como verde, afilado, redondo o profundo.
    anchors:
      - bajo
      - medio
      - alto
  - id: adstringencia
    label: Astringencia
    kind: structure
    description: Secancia táctil y gingival, corta o prolongada, positiva cuando sostiene la bebida sin raspar.
    anchors:
      - fina
      - marcada
      - agresiva
  - id: corpo
    label: Cuerpo
    kind: structure
    description: Densidad, peso y llenado táctil de la bebida a lo largo de la sesión.
    anchors:
      - ligero
      - medio
      - lleno
  - id: textura
    label: Textura
    kind: structure
    description: Calidad táctil de la bebida, yendo de sedosa y cremosa a arenosa o áspera.
    anchors:
      - sedosa
      - cremosa
      - arenosa
  - id: suculencia
    label: Jugosidad
    kind: structure
    description: Capacidad de la bebida para estimular salivación y mantener sensación caldosa o acuosa en boca.
    anchors:
      - acuosa
      - salivante
      - caldosa
  - id: persistencia
    label: Persistencia
    kind: structure
    description: Tiempo de permanencia de las sensaciones y del retrogusto después del sorbo.
    anchors:
      - corta
      - media
      - larga
  - id: final
    label: Final
    kind: structure
    description: Dirección y calidad del cierre sensorial en el retrogusto.
    anchors:
      - limpio
      - seco
      - dulce
  - id: trigeminalidade
    label: Trigeminalidad
    kind: trigeminal
    description: Frescura, hormigueo, calentamiento o leve anestesia percibidos físicamente y separados del aroma.
    anchors:
      - contenida
      - presente
      - dominante
  - id: tipicidade
    label: Tipicidad
    kind: judgment
    description: Adherencia al estilo base o coherencia con la propuesta sensorial declarada.
    anchors:
      - difusa
      - correcta
      - ejemplar
  - id: limpeza
    label: Limpieza
    kind: judgment
    description: Ausencia de contaminaciones, desvíos y ruidos que comprometan la lectura.
    anchors:
      - comprometida
      - correcta
      - limpia
styles:
  - id: chimarrao
    label: Chimarrão tradicional brasileño
    shortLabel: Chimarrão
    description: Yerba muy fresca, molienda fina, alto contenido de polvo, poco o ningún estacionamiento.
  - id: terere
    label: Tereré
    shortLabel: Tereré
    description: Corte más grueso, mayor proporción de palos, extracción en frío.
  - id: argentino
    label: Mate argentino con palo
    shortLabel: Argentino
    description: Hoja más gruesa, presencia relevante de palos, estacionamiento prolongado.
  - id: uruguaio
    label: Mate uruguayo despalado o PU-1
    shortLabel: Uruguayo
    description: Corte fino, casi sin palos, polvo relevante, normalmente estacionado.
  - id: tostado
    label: Mate tostado
    shortLabel: Tostado
    description: Tratamiento térmico más intenso, perfil de Maillard.
